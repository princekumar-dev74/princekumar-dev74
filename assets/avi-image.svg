<svg xmlns="http://www.w3.org/2000/svg" width="840" height="875" viewBox="0 0 840 875" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0" stop-color="#0d1117"/>
    <stop offset="1" stop-color="#0d1117"/>
  </linearGradient>
  <linearGradient id="scanGlow" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0" stop-color="#39d353" stop-opacity="0"/>
    <stop offset="0.5" stop-color="#39d353" stop-opacity="0.01"/>
    <stop offset="0.75" stop-color="#39d353" stop-opacity="0.06"/>
    <stop offset="0.9" stop-color="#39d353" stop-opacity="0.18"/>
    <stop offset="1" stop-color="#39d353" stop-opacity="0.55"/>
  </linearGradient>
  <clipPath id="artArea">
    <rect x="0" y="30" width="840" height="802"/>
  </clipPath>
  <mask id="revealMask">
    <rect x="0" y="30" width="840" height="0" fill="white">
      <animate attributeName="height" from="0" to="802" dur="10s" fill="freeze" calcMode="linear"/>
    </rect>
  </mask>
  <filter id="lineGlow" x="-5%" y="-200%" width="110%" height="500%">
    <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
</defs>

<rect width="840" height="875" rx="12" fill="url(#bg)"/>
<rect x=".5" y=".5" width="839" height="874" rx="12" fill="none" stroke="#30363d"/>
<line x1="0" y1="30" x2="840" y2="30" stroke="#30363d"/>
<circle cx="20" cy="15" r="5" fill="#ff5f56"/>
<circle cx="36" cy="15" r="5" fill="#ffbd2e"/>
<circle cx="52" cy="15" r="5" fill="#27c93f"/>
<text x="420" y="19" fill="#8b949e" font-size="12" text-anchor="middle">princekumar-dev74@github: ~$ ./portrait.sh</text>

